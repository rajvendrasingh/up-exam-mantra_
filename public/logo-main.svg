<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="white"/>
  
  <!-- Sun rays -->
  <g transform="translate(140, 40)">
    <path d="M0,-15 L5,-5 L-5,-5 Z" fill="#FDB913"/>
    <path d="M10,-10 L12,0 L2,0 Z" fill="#FDB913" transform="rotate(30 0 0)"/>
    <path d="M15,-5 L15,5 L5,5 Z" fill="#FDB913" transform="rotate(60 0 0)"/>
    <path d="M15,0 L15,10 L5,10 Z" fill="#FDB913" transform="rotate(90 0 0)"/>
    <path d="M10,10 L12,20 L2,20 Z" fill="#FDB913" transform="rotate(120 0 0)"/>
    <path d="M5,15 L10,25 L0,25 Z" fill="#FDB913" transform="rotate(150 0 0)"/>
  </g>
  
  <!-- Sun circle -->
  <circle cx="140" cy="50" r="25" fill="#FDB913"/>
  <circle cx="140" cy="50" r="20" fill="#FFCB05"/>
  
  <!-- UP Text (Red) -->
  <text x="50" y="90" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#DC143C" letter-spacing="-2">UP</text>
  
  <!-- Arrow -->
  <path d="M85 45 L100 30 L115 45 L105 45 L105 70 L95 70 L95 45 Z" fill="#FDB913"/>
  
  <!-- EXAM Text (White on Blue) -->
  <rect x="30" y="95" width="140" height="35" fill="#003DA5" rx="5"/>
  <text x="100" y="120" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle">EXAM</text>
  
  <!-- MANTRA Text (Yellow - Clean) -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#FDB913" text-anchor="middle" letter-spacing="2">MANTRA</text>
  
  <!-- Ribbon Banner -->
  <path d="M30,165 L170,165 L175,175 L170,185 L30,185 L25,175 Z" fill="#003DA5"/>
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">UP Exams Made Easy</text>
</svg>
